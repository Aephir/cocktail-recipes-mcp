services:
  cocktail-recipes-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: never
    environment:
      COCKTAIL_API_BASE_URL: ${COCKTAIL_API_BASE_URL}
      COCKTAIL_API_USERNAME: ${COCKTAIL_API_USERNAME}
      COCKTAIL_API_PASSWORD: ${COCKTAIL_API_PASSWORD}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HTTP_HOST: ${MCP_HTTP_HOST:-0.0.0.0}
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-8000}
      MCP_HTTP_PATH: ${MCP_HTTP_PATH:-/mcp}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      AUTH_USERNAME: ${AUTH_USERNAME}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      OAUTH_ACCESS_TOKEN_TTL_SECONDS: ${OAUTH_ACCESS_TOKEN_TTL_SECONDS:-3600}
      OAUTH_REFRESH_TOKEN_TTL_SECONDS: ${OAUTH_REFRESH_TOKEN_TTL_SECONDS:-2592000}
      OAUTH_AUTHORIZATION_CODE_TTL_SECONDS: ${OAUTH_AUTHORIZATION_CODE_TTL_SECONDS:-600}
      OAUTH_STORAGE_DIR: ${OAUTH_STORAGE_DIR:-/data/oauth}
      OAUTH_JWT_KEY_PATH: ${OAUTH_JWT_KEY_PATH:-/data/oauth/jwt_signing_key.pem}
      OAUTH_CLIENT_REDIRECT_ALLOWLIST: ${OAUTH_CLIENT_REDIRECT_ALLOWLIST:-}
    ports:
      - "${MCP_HTTP_PUBLISH_PORT:-8000}:${MCP_HTTP_PORT:-8000}"
    volumes:
      - oauth_data:${OAUTH_STORAGE_DIR:-/data/oauth}
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  oauth_data:
